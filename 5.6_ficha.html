<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personagens - Kigen Shinobi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Russo+One&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface2: #1a1a1a;
      --border: #cc0000;
      --accent: #cc0000;
      --accent2: #ff4444;
      --glow: rgba(204,0,0,0.6);
      --shadow: rgba(204,0,0,0.38);
      --text: #f0f0f0;
      --text-sub: #999999;
    }

    [data-theme="light"] {
      --bg: #efefef;
      --surface: #ffffff;
      --surface2: #f5f5f5;
      --border: #cc0000;
      --accent: #cc0000;
      --accent2: #dd0000;
      --glow: rgba(204,0,0,0.30);
      --shadow: rgba(204,0,0,0.18);
      --text: #111111;
      --text-sub: #555555;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg);
      transition: color 0.4s, background 0.4s;
      padding-top: 60px;
    }

    /* FLOATING UI (igual às outras páginas) */
    #floating-ui {
      position: fixed; top: 20px; right: 22px; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    #menu-btn {
      width: 54px; height: 54px; border-radius: 50%; background: #000;
      border: 2.5px solid var(--border); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 14px var(--glow); transition: box-shadow 0.25s, transform 0.2s;
    }
    #menu-btn:hover { box-shadow: 0 0 28px var(--glow); transform: scale(1.07); }
    #menu-btn svg.kunai { width: 26px; height: 26px; transition: transform 0.35s; }
    #menu-btn.open svg.kunai { transform: rotate(135deg); }

    #theme-toggle {
      width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border);
      background: #000; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 0 8px var(--glow); transition: box-shadow 0.3s, transform 0.2s;
    }
    #theme-toggle:hover { transform: scale(1.12); box-shadow: 0 0 18px var(--glow); }
    #theme-toggle svg { width: 15px; height: 15px; }
    #theme-toggle .icon-sun { display: none; }
    #theme-toggle .icon-moon { display: block; fill: #aac8ff; }
    [data-theme="light"] #theme-toggle .icon-sun { display: block; fill: none; stroke: #ffcc00; stroke-width: 2; }
    [data-theme="light"] #theme-toggle .icon-moon { display: none; }

    #nav-overlay {
      position: fixed; inset: 0; z-index: 900; display: flex; align-items: flex-start; justify-content: flex-end;
      pointer-events: none; opacity: 0; transition: opacity 0.35s;
    }
    #nav-overlay.open { pointer-events: all; opacity: 1; }
    .overlay-bg { position: absolute; inset: 0; background: rgba(0,0,0,0.82); backdrop-filter: blur(6px); cursor: pointer; }

    #nav-panel {
      position: relative; z-index: 1; background: var(--surface); border-left: 2px solid var(--border);
      width: min(300px, 80vw); height: 100%; display: flex; flex-direction: column; padding: 110px 36px 40px;
      gap: 4px; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
      box-shadow: -10px 0 60px var(--shadow); overflow-y: auto;
    }
    #nav-panel::-webkit-scrollbar { width: 6px; }
    #nav-panel::-webkit-scrollbar-track { background: transparent; }
    #nav-panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
    #nav-overlay.open #nav-panel { transform: translateX(0); }

    .nav-link {
      display: block; font-family: 'Russo One', sans-serif; font-size: 0.92rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--text); text-decoration: none; padding: 13px 0;
      border-bottom: 1px solid rgba(204,0,0,0.18); position: relative; transition: color 0.2s, padding-left 0.2s;
      flex-shrink: 0;
    }
    .nav-link::before { content: ''; position: absolute; left: -36px; top: 50%; transform: translateY(-50%); width: 0; height: 2px; background: var(--accent); transition: width 0.25s; }
    .nav-link:hover { color: var(--accent2); padding-left: 12px; }
    .nav-link:hover::before { width: 20px; }

    .container {
      max-width: 1100px; margin: 0 auto; width: 100%; padding: 0 24px 60px;
    }

    /* TÍTULO DA PÁGINA */
    .page-title {
      font-family: 'Russo One', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
    }
    .page-subtitle {
      text-align: center;
      color: var(--text-sub);
      margin-bottom: 40px;
      font-size: 0.95rem;
    }

    /* BUSCA */
    .search-bar {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
    }
    .search-bar input {
      width: 100%;
      max-width: 420px;
      background: var(--surface2);
      border: 1.5px solid rgba(204,0,0,0.3);
      border-radius: 30px;
      padding: 12px 20px;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
    }
    .search-bar input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(204,0,0,0.3);
    }

    /* GRUPOS POR PATENTE */
    .patente-group {
      margin-bottom: 48px;
    }
    .patente-heading {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }
    .patente-heading .line {
      flex: 1;
      height: 1px;
      background: rgba(204,0,0,0.35);
    }
    .patente-heading h2 {
      font-family: 'Russo One', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
    }

    .char-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    .char-card {
      background: var(--surface);
      border: 2px solid rgba(204,0,0,0.3);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
      display: block;
    }
    .char-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 24px var(--shadow);
    }

    .char-card img {
      width: 84px;
      height: 84px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--accent);
      margin-bottom: 12px;
    }

    .char-card .char-name {
      font-family: 'Russo One', sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .char-card .char-vila {
      display: inline-block;
      font-size: 0.72rem;
      color: var(--accent);
      background: rgba(204,0,0,0.15);
      border: 1px solid rgba(204,0,0,0.4);
      border-radius: 6px;
      padding: 3px 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .loading, .empty {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-sub);
    }
    .error {
      background: rgba(255,68,68,0.1);
      border: 2px solid #ff4444;
      border-radius: 12px;
      padding: 24px;
      color: #ff4444;
    }
  </style>
</head>
<body>

      <svg class="kunai" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="16,2 20,14 16,18 12,14" fill="#ffffff"/>
        <rect x="11" y="17" width="10" height="3" rx="1" fill="#cccccc"/>
        <rect x="14" y="20" width="4" height="7" rx="1.5" fill="#aaaaaa"/>
        <circle cx="16" cy="29" r="2" stroke="#aaaaaa" stroke-width="1.5" fill="none"/>
      </svg>
    </button>
    <button id="theme-toggle" aria-label="Alternar tema claro/escuro">
      <svg class="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

  </div>

  <div id="nav-overlay" role="dialog" aria-modal="true">
    <div class="overlay-bg" id="overlay-close"></div>
    <nav id="nav-panel">
      <a class="nav-link" href="index.html">Início</a>
      <a class="nav-link" href="personagens_lista.html">Personagens</a>

  <div class="container">
    <h1 class="page-title">Shinobis da Vila</h1>
    <p class="page-subtitle" id="contador">Carregando...</p>

    <div class="search-bar">
      <input type="text" id="busca" placeholder="Buscar personagem pelo nome...">
    </div>

    <div id="loading" class="loading">Carregando personagens...</div>
    <div id="error" class="error" style="display:none;"></div>
    <div id="lista" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ======= CONFIG SUPABASE (mesma config da ficha) =======
    const SUPABASE_URL = 'https://etojqmmhdciphantyzoa.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0b2pxbW1oZGNpcGhhbnR5em9hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyOTY5OTIsImV4cCI6MjA5ODg3Mjk5Mn0.1_zs_w7E_MZ9O5Iq4F76UQsos6i8zZhvWpjzVtsfxAA';

    const supabase = window.supabaseClient || window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    window.supabaseClient = supabase;

    // Ordem de exibição das patentes. Ajuste os nomes exatamente
    // como estão salvos na coluna "patente" no seu Supabase.
    const ORDEM_PATENTES = ['Hokage', 'Sannin', 'Anbu', 'Jonin', 'Chunin', 'Genin', 'Academico'];

    // Para onde a ficha deve levar ao clicar (o arquivo da ficha que você já tem)
    const FICHA_URL = '5.6_ficha.html';

    let todosPersonagens = [];

    // ======= MENU E TEMA (igual às outras páginas) =======
    const menuBtn = document.getElementById('menu-btn');
    const navOverlay = document.getElementById('nav-overlay');
    document.getElementById('overlay-close').addEventListener('click', closeMenu);
    menuBtn.addEventListener('click', () => {
      const open = navOverlay.classList.toggle('open');
      menuBtn.classList.toggle('open', open);
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
    function closeMenu() {
      navOverlay.classList.remove('open');
      menuBtn.classList.remove('open');
    }

    const root = document.documentElement;
    const savedTheme = localStorage.getItem('ks-theme') || 'dark';
    root.setAttribute('data-theme', savedTheme);
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('ks-theme', next);
    });

    // ======= CARREGAR PERSONAGENS =======
    async function carregarPersonagens() {
      try {
        const { data, error } = await supabase
          .from('personagens_public')
          .select('id, nome, patente, vila, status, foto_url')
          .eq('status', 'vivo')
          .order('nome', { ascending: true });

        if (error) throw error;

        todosPersonagens = data || [];
        document.getElementById('contador').textContent = `${todosPersonagens.length} personagens ativos`;
        renderLista(todosPersonagens);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('lista').style.display = 'block';
      } catch (err) {
        console.error('Erro ao carregar personagens:', err);
        document.getElementById('error').textContent = `Erro ao carregar personagens: ${err.message}`;
        document.getElementById('error').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      }
    }

    // ======= RENDERIZAR AGRUPADO POR PATENTE =======
    function renderLista(personagens) {
      const lista = document.getElementById('lista');
      lista.innerHTML = '';

      if (personagens.length === 0) {
        lista.innerHTML = '<p class="empty">Nenhum personagem encontrado.</p>';
        return;
      }

      // agrupa por patente
      const grupos = {};
      personagens.forEach(p => {
        const patente = p.patente || 'Sem Patente';
        if (!grupos[patente]) grupos[patente] = [];
        grupos[patente].push(p);
      });

      // monta a ordem final: patentes conhecidas primeiro, depois o resto
      const extras = Object.keys(grupos).filter(p => !ORDEM_PATENTES.includes(p));
      const ordemFinal = [...ORDEM_PATENTES, ...extras].filter(p => grupos[p]?.length);

      ordemFinal.forEach(patente => {
        const grupoDiv = document.createElement('div');
        grupoDiv.className = 'patente-group';

        grupoDiv.innerHTML = `
          <div class="patente-heading">
            <div class="line"></div>
            <h2>${patente}</h2>
            <div class="line"></div>
          </div>
          <div class="char-grid"></div>
        `;

        const grid = grupoDiv.querySelector('.char-grid');
        grupos[patente].forEach(p => {
          const card = document.createElement('a');
          card.className = 'char-card';
          card.href = `${FICHA_URL}?id=${p.id}`;
          card.innerHTML = `
            <img src="${p.foto_url || 'https://via.placeholder.com/84'}" alt="${p.nome}">
            <div class="char-name">${p.nome}</div>
            ${p.vila ? `<span class="char-vila">${p.vila}</span>` : ''}
          `;
          grid.appendChild(card);
        });

        lista.appendChild(grupoDiv);
      });
    }

    // ======= BUSCA =======
    document.getElementById('busca').addEventListener('input', (e) => {
      const termo = e.target.value.toLowerCase().trim();
      const filtrados = todosPersonagens.filter(p => p.nome.toLowerCase().includes(termo));
      renderLista(filtrados);
    });

    carregarPersonagens();
  </script>
</body>
